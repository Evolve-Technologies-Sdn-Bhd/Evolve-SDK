name: CI Pipeline

on:
  push:
    branches: [ main ]  # Trigger on push to main
  pull_request:
    branches: [ main ]  # Trigger on pull requests

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Gets your code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # Speeds up future runs

      - name: Install dependencies
        run: npm ci  # Clean install for CI

      - name: Run tests & coverage
        run: npm test -- --coverage  # Generates the report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/  # Saves report for manual viewing
